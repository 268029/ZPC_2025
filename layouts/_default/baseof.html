<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>
      {{ if .IsHome }}
        {{ .Site.Title }}
      {{ else }}
        {{ .Title }} · {{ .Site.Title }}
      {{ end }}
    </title>

    <meta name="description" content="{{ with .Site.Params.description }}{{ . }}{{ end }}">

    {{!-- CSS (OPRAVENO) --}}
    <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
  </head>

  <body>
    {{ partial "header.html" . }}

    <main id="content">
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
  </body>
</html>
